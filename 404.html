<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>页面重定向中...</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #0b5ea8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.2);
      text-align: center;
    }
    h1 { margin: 0 0 16px; font-size: 1.5rem; color: #1f2937; }
    p { margin: 0 0 24px; color: #667085; line-height: 1.6; }
    .loader {
      width: 40px;
      height: 40px;
      border: 4px solid #e5e7eb;
      border-top-color: #0b5ea8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 24px auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .fallback-link {
      display: inline-block;
      padding: 10px 16px;
      background: #0b5ea8;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      margin-top: 16px;
    }
    .fallback-link:hover { background: #0949a1; }
    .error-info { margin-top: 24px; padding-top: 24px; border-top: 1px solid #e5e7eb; color: #667085; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>✨ 正在加载论文...</h1>
    <div class="loader"></div>
    <p id="status">正在识别论文并重定向</p>
    <a href="/" class="fallback-link">返回主页</a>
    <div class="error-info" id="debug"></div>
  </div>

  <script>
    // 论文映射表（可随时扩展）
    const paperRoutes = {
      'msa': '/papers/msa/',
      'bert': '/papers/bert/',
      'transformer': '/papers/transformer/',
      // 后续添加更多论文...
    };

    function handleRedirect() {
      // 获取当前请求的路径
      const pathArray = window.location.pathname.split('/').filter(p => p);
      // 过滤掉仓库名 "Memory_Paper"，获取请求的论文 ID
      const paperId = pathArray[pathArray.indexOf('Memory_Paper') + 1];
      
      const debug = document.getElementById('debug');
      debug.innerHTML = `<strong>调试信息：</strong><br/>原始路径: ${window.location.pathname}<br/>论文 ID: ${paperId || '(未识别)'}`;

      if (!paperId) {
        // 没有论文 ID，返回主页
        document.getElementById('status').textContent = '重定向到主页...';
        setTimeout(() => {
          window.location.replace('/Memory_Paper/');
        }, 500);
        return;
      }

      const targetUrl = paperRoutes[paperId];
      
      if (targetUrl) {
        // 找到匹配的论文
        document.getElementById('status').textContent = `正在加载论文: ${paperId}`;
        setTimeout(() => {
          window.location.replace(`/Memory_Paper${targetUrl}`);
        }, 800);
      } else {
        // 没有找到匹配的论文
        document.getElementById('status').innerHTML = `
          <strong>❌ 论文未找到</strong><br/>
          查找的论文 ID: <code>${paperId}</code><br/>
          <br/>
          已支持的论文: ${Object.keys(paperRoutes).join(', ')}<br/>
          <small>如需添加新论文，请编辑 404.html 中的 paperRoutes 映射</small>
        `;
      }
    }

    // 页面加载完成后执行重定向
    window.addEventListener('load', handleRedirect);
    // 或立即执行（更快）
    handleRedirect();
  </script>
</body>
</html>
